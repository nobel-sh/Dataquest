services:
  postgres:
    image: postgres:16-alpine
    container_name: dataquest-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: dataquest
      POSTGRES_USER: dataquest
      POSTGRES_PASSWORD: dataquest
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dataquest -d dataquest"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
